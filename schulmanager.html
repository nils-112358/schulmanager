<body>

<div class="widgets-container" id="widgets-container">
  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <div>Lade Vertretungsdaten …</div>
  </div>
</div>

<script>
var SCREEN_ID = 'pDfrUsj1D37bhK';
var DATA_URL = 'https://login.schulmanager-online.de/screen/' + SCREEN_ID + '/content';

var SUBJECT_MAP = {
  'D':   'Zellenbelegung',
  'D\u00dc': 'Gittertalk',
  'E':   'Knastslang',
  'M':   'Fluchtplanung',
  'B':   'Schlossknacken',
  'G':   'Ausbruchsgeschichte',
  'K':   'T\u00e4towierkunst',
  'F':   'Flucht auf Franz\u00f6sisch',
  'Ph':  'Gitterstabphysik',
  'EG':  'Bew\u00e4hrungsgespr\u00e4ch',
  'SSp': 'Hofspaziergang',
  'Sm':  'Schl\u00fcsselfeilen',
  'Sw':  'Kanalfluchtschwimmen',
};

var PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.cors.lol/?url=',
  'https://api.allorigins.win/raw?url=',
];

var proxyIndex = 0;

function showError(msg) {
  document.getElementById('widgets-container').innerHTML = '<div class="error-state">'
    + '<div>' + msg + '</div>'
    + '<div class="sub">Stelle sicher, dass die Datei über einen Server geöffnet wird (z.B. GitHub Pages oder python3 -m http.server).</div>'
    + '<a class="btn" href="https://github.com/new" target="_blank">GitHub Repo erstellen</a>'
    + '</div>';
}

function tryFetch() {
  if (proxyIndex >= PROXIES.length) {
    showError('Konnte Vertretungsdaten nicht laden. CORS-Proxies nicht erreichbar.');
    return;
  }
  var url = PROXIES[proxyIndex] + encodeURIComponent(DATA_URL);
  var xhr = new XMLHttpRequest();
  xhr.timeout = 30000;
  xhr.ontimeout = xhr.onerror = function() { proxyIndex++; tryFetch(); };
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var html = xhr.responseText;
      if (PROXIES[proxyIndex-1] && PROXIES[proxyIndex-1].includes('api.cors.lol')) {
        // cors.lol returns HTML directly
        onSuccess(html);
      } else if (PROXIES[proxyIndex-1] && PROXIES[proxyIndex-1].includes('allorigins.win/get')) {
        try { onSuccess(JSON.parse(html).contents); } catch(e) { onSuccess(html); }
      } else {
        onSuccess(html);
      }
    } else { proxyIndex++; tryFetch(); }
  };
  xhr.open('GET', url);
  xhr.send();
}

var currentTimeouts = [];
function clearTimeouts() { currentTimeouts.forEach(function(t) { clearTimeout(t); }); currentTimeouts = []; }
function getHeight(el) { return parseInt(window.getComputedStyle(el).height); }

function onSuccess(html) {
  clearTimeouts();
  html = html.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '').replace(/<link[^>]*>/gi, '');
  document.getElementById('widgets-container').innerHTML = html;

  document.querySelectorAll('.widget').forEach(function(w) {
    var t = w.querySelector('.widget-title'), c = w.querySelector('.widget-content');
    if (c && t && getHeight(w) === getHeight(c))
      c.style.height = (c.clientHeight - (t.offsetHeight + parseFloat(window.getComputedStyle(t).marginBottom))) + 'px';
  });

  document.querySelectorAll('.take-available-space').forEach(function(el) {
    if (!(el instanceof HTMLElement)) return;
    var parent = el.parentElement;
    while (!parent.style.height && parent.classList.contains('take-available-space')) parent = parent.parentElement;
    function setH() { el.style.height = '1000000px'; el.style.height = (1000000 - (parent.scrollHeight - getHeight(parent))) + 'px'; }
    function fix() { var h = getHeight(parent); setH(); if (getHeight(parent) !== h) currentTimeouts.push(setTimeout(fix, 50)); }
    fix(); currentTimeouts.push(setTimeout(fix, 1000));
  });

  document.querySelectorAll('.alternating-scroller').forEach(function(el) {
    if (!(el instanceof HTMLElement)) return;
    var parent = el.parentElement, speed = el.dataset.scrollSpeed || 1, interval;
    function down() {
      var diff = getHeight(el) - getHeight(parent);
      interval = Math.max(5000, Math.floor(diff / 100 * 10000));
      interval = Math.round(interval / speed);
      var tt = Math.max(interval / 1000 / 3, interval / 1000 / 2 - 8);
      if (diff > 3) { el.style.transition = 'margin-top ' + tt + 's linear'; el.style.marginTop = '-' + diff + 'px'; }
      currentTimeouts.push(setTimeout(up, interval / 2));
    }
    function up() { el.style.marginTop = '0'; currentTimeouts.push(setTimeout(down, interval / 2)); }
    up();
  });

  document.querySelectorAll('.table-paginator').forEach(function(el) {
    if (!(el instanceof HTMLElement)) return;
    var parent = el.parentElement, tbody = el.querySelector('tbody');
    if (!tbody) return;
    var minInt = 3000, maxInt = 15000;
    function getOH(e) { if (!e) return 0; if (typeof e === 'string') e = document.querySelector(e); var s = window.getComputedStyle(e); return Math.ceil(e.offsetHeight + parseFloat(s.marginTop) + parseFloat(s.marginBottom)); }
    function hasClear() { var s = window.getComputedStyle(el); return getHeight(parent) > (el.scrollHeight + parseFloat(s.marginTop) + parseFloat(s.marginBottom) + getOH(parent.querySelector('.substitution-text-container')) + getOH(parent.querySelector('.teachers-table'))); }
    var offset = 0;
    function next() {
      var rows = tbody.querySelectorAll('tr');
      rows.forEach(function(r) { r.style.display = 'none'; });
      do { rows[offset].style.display = 'table-row'; offset++; } while (hasClear() && offset < rows.length);
      if (offset < rows.length) rows[--offset].style.display = 'none';
      offset = rows.length > 0 ? offset % rows.length : 0;
      currentTimeouts.push(setTimeout(next, (minInt + (getHeight(tbody) / window.innerHeight) * (maxInt - minInt)) / 2));
    }
    next();
  });

  document.querySelectorAll('.widget').forEach(function(w) {
    var tc = w.querySelector('.substitution-tiles');
    if (!tc || !w.style.height) return;
    var h = parseInt(w.style.height);
    var rows = Math.ceil(parseInt(tc.attributes.numberOfClasses.value) / parseInt(tc.attributes.columns.value));
    var th = (h / rows) + '%';
    tc.querySelectorAll('.substitution-tile').forEach(function(t) { if (t instanceof HTMLElement) t.style.height = th; });
  });
}

tryFetch();
setInterval(tryFetch, (115 + Math.round(Math.random() * 10)) * 1000);
</script>

<script>
(function() {
  function patchSubjects(root) {
    root.querySelectorAll('td.subject span').forEach(function(span) {
      var t = span.textContent.trim();
      var hasParen = t.startsWith('(') && t.endsWith(')');
      var key = hasParen ? t.slice(1, -1) : t;
      if (SUBJECT_MAP[key]) span.textContent = hasParen ? '(' + SUBJECT_MAP[key] + ')' : SUBJECT_MAP[key];
    });
  }
  function patchDates(root) {
    var days = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
    function fmt(d) { return days[d.getDay()] + ', ' + String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear(); }
    var now = new Date(), todayStr = fmt(now);
    var tomorrow = new Date(now);
    var add = 1;
    if (now.getDay() === 5) add = 3;
    if (now.getDay() === 6) add = 2;
    tomorrow.setDate(now.getDate() + add);
    root.querySelectorAll('.widget-title').forEach(function(el) {
      el.innerHTML = el.innerHTML.replace(/heute,\s*[\d\.]+/g, 'heute, ' + todayStr).replace(/morgen,\s*\w+,\s*[\d\.]+/g, 'morgen, ' + fmt(tomorrow));
    });
  }
  function patchAll(container) { patchSubjects(container); patchDates(container); }
  document.addEventListener('DOMContentLoaded', function() { patchAll(document); });
  var container = null;
  function hookContainer() {
    container = document.getElementById('widgets-container');
    if (!container) return;
    var proto = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
    var origSet = proto.set;
    Object.defineProperty(container, 'innerHTML', {
      set: function(html) {
        var tmp = document.createElement('div');
        origSet.call(tmp, html);
        patchAll(tmp);
        origSet.call(this, tmp.innerHTML);
      },
      get: proto.get
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hookContainer);
  else hookContainer();
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function() { setTimeout(tryFetch, 100); });
  else setTimeout(tryFetch, 100);
})();
</script>

    (function loop() { var now = Date.now(); if (now - last >= interval) { showSkull(); last = now; } setTimeout(function() { applyGlitch(['low', 'medium', 'medium', 'high'][Math.floor(Math.random() * 4)]); loop(); }, 800 + Math.random() * 3000); })();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startEffects); else startEffects();
})();
</script>
